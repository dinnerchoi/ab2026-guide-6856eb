<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>AB2026 방문체크 · 네트워킹</title>
<style>
:root{--navy:#10204a;--navy2:#1c3164;--gold:#c79a3a;--green:#1f8a4c;--bg:#f4f5f7;--line:#e3e6ec;--mut:#73798a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);color:#16181d;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",sans-serif;}
header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:10px 12px 8px;box-shadow:0 2px 10px rgba(0,0,0,.18);}
h1{font-size:15px;margin:0 0 2px;font-weight:700;letter-spacing:.2px;}
.sub{font-size:11px;color:#b9c2db;line-height:1.4;}
.counts{display:flex;gap:6px;margin-top:7px;font-size:11.5px;font-weight:600;flex-wrap:wrap;}
.counts span{background:rgba(255,255,255,.10);padding:3px 8px;border-radius:20px;}
.counts .cv{background:rgba(31,138,76,.30);} .counts .ct{background:rgba(199,154,58,.30);}
.tools{position:sticky;top:0;z-index:15;background:#fff;border-bottom:1px solid var(--line);padding:8px 10px;}
#q{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;outline:none;}
#q:focus{border-color:var(--navy2);}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 1px 1px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;font-size:12px;padding:6px 11px;border-radius:18px;border:1px solid var(--line);background:#fff;color:#333;cursor:pointer;white-space:nowrap;font-weight:600;}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.sortbar{display:flex;gap:6px;align-items:center;font-size:11.5px;color:var(--mut);padding:7px 1px 0;}
.sortbar b{color:#16181d;}
.sortbtn{cursor:pointer;padding:3px 9px;border-radius:14px;border:1px solid var(--line);background:#fff;font-size:11.5px;font-weight:600;}
.sortbtn.on{background:var(--navy2);color:#fff;border-color:var(--navy2);}
.wrap{padding:10px 10px 110px;max-width:760px;margin:0 auto;}
.seclabel{font-size:12px;font-weight:800;color:var(--navy);margin:16px 4px 7px;letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;}
.seclabel small{color:var(--mut);font-weight:600;}
.card{display:flex;gap:9px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:8px;align-items:flex-start;}
.card.t{border-color:var(--gold);background:#fffbf0;box-shadow:0 1px 0 var(--gold) inset, 4px 0 0 var(--gold) inset;}
.card.v{opacity:.5;}
.card.v .name{text-decoration:line-through;}
.ck{display:flex;flex-direction:column;gap:6px;flex:0 0 auto;}
.b{width:42px;height:36px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cfd3db;font-weight:700;}
.b.vb.on{background:var(--green);border-color:var(--green);color:#fff;}
.b.tb.on{background:var(--gold);border-color:var(--gold);color:#fff;}
.body{flex:1;min-width:0;}
.name{font-size:14.5px;font-weight:700;line-height:1.25;}
.badge{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;margin-left:5px;vertical-align:middle;}
.bp1{background:#fde7c8;color:#9a6a12;} .bp2{background:#eef0f4;color:#5b6273;} .bp3{background:#eef0f4;color:#8b91a0;}
.bk{background:#10204a;color:#fff;} .bkr{background:#fff;border:1px solid #e0a3a3;color:#c2453f;}
.bdebut{background:#e6f3ec;color:#1f8a4c;} .bul{background:#efe7f7;color:#7a4caa;}
.meta{font-size:11.5px;color:var(--mut);margin-top:2px;}
.meta b{color:#37506e;font-weight:700;}
.art{font-size:11.5px;color:#444;margin-top:4px;line-height:1.35;}
.art .lab{color:var(--mut);font-weight:600;}
.krline{font-size:11.5px;color:#b5564f;margin-top:3px;font-weight:600;}
.memo{font-size:11.5px;color:#3a3f4b;margin-top:5px;line-height:1.4;}
.sale{font-size:11.5px;color:#1f6e3b;margin-top:4px;line-height:1.35;font-weight:600;background:#eafaf0;border-radius:7px;padding:4px 7px;}
.talk{font-size:12px;color:#5a4410;margin-top:5px;line-height:1.45;background:#fff6df;border:1px solid #f0e0a8;border-radius:8px;padding:6px 8px;}
.talk b{color:#946a00;}
.bfs{background:#e7eefc;color:#2554c7;border:1px solid #c3d4f5;}
.empty{text-align:center;color:var(--mut);padding:40px 0;font-size:13px;}
.fab{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(244,245,247,0),var(--bg) 30%);}
.fab button{width:100%;max-width:760px;margin:0 auto;display:block;padding:14px;border:0;border-radius:12px;background:var(--navy);color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(16,32,74,.3);}
.modal{position:fixed;inset:0;z-index:50;background:rgba(8,12,24,.55);display:none;align-items:flex-end;}
.modal.on{display:flex;}
.sheet{background:#fff;width:100%;max-width:760px;margin:0 auto;border-radius:16px 16px 0 0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));max-height:86vh;display:flex;flex-direction:column;}
.sheet h3{margin:2px 0 8px;font-size:15px;}
.sheet p{font-size:11.5px;color:var(--mut);margin:0 0 8px;line-height:1.4;}
.sheet textarea{width:100%;flex:1;min-height:200px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px;font-family:ui-monospace,Menlo,monospace;resize:none;}
.srow{display:flex;gap:8px;margin-top:10px;}
.srow button{flex:1;padding:13px;border-radius:11px;border:0;font-size:14px;font-weight:800;cursor:pointer;}
.copyb{background:var(--gold);color:#fff;} .closeb{background:#eef0f4;color:#333;}
.tip{background:#fff7e6;border:1px solid #f0dcab;color:#7a5a14;font-size:11.5px;border-radius:9px;padding:8px 10px;margin:8px 0 0;line-height:1.45;}
/* ===== NYC tab ===== */
.tabbar{display:flex;background:var(--navy);padding:0 6px;position:sticky;top:0;z-index:19;border-top:1px solid rgba(255,255,255,.08);}
.tabbtn{flex:1;background:none;border:none;color:#b9c2db;font-size:13px;font-weight:700;padding:11px 4px;cursor:pointer;border-bottom:3px solid transparent;}
.tabbtn.on{color:#fff;border-bottom-color:var(--gold);}
#nycview{padding:10px 10px 110px;max-width:760px;margin:0 auto;}
.nyc-intro{background:#fff;border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.5;color:#2a2f3a;margin-bottom:10px;}
.nyc-mut{color:var(--mut);}
.nyc-counts{display:flex;gap:6px;font-size:11.5px;font-weight:700;margin-bottom:9px;flex-wrap:wrap;}
.nyc-counts span{background:#eef0f4;color:#37506e;padding:3px 9px;border-radius:20px;}
.nyc-counts .cv{background:#fdeccb;color:#9a6a12;} .nyc-counts .ct{background:#e3f3e9;color:#1f8a4c;}
.nyc-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;}
.nyc-card.done{opacity:.55;}
.nyc-name{font-size:14.5px;font-weight:700;line-height:1.3;}
.nyc-sub{font-size:11px;color:var(--mut);margin-top:2px;}
.nyc-tag{font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;margin-left:4px;vertical-align:middle;}
.nyc-tag.thq{background:#10204a;color:#fff;} .nyc-tag.tbr{background:#eef0f4;color:#5b6273;}
.nyc-br{font-size:11px;color:#37506e;margin-top:3px;}
.nyc-talk{font-size:12px;color:#5a4410;margin-top:6px;line-height:1.45;background:#fff6df;border:1px solid #f0e0a8;border-radius:8px;padding:6px 8px;}
.nyc-chk{display:flex;gap:7px;margin-top:8px;}
.nyc-b{flex:1;border:1.5px solid var(--line);background:#fff;color:#73798a;border-radius:9px;padding:8px 4px;font-size:12.5px;font-weight:700;cursor:pointer;}
.nyc-b.cardb.on{background:var(--gold);border-color:var(--gold);color:#fff;}
.nyc-b.visitb.on{background:var(--green);border-color:var(--green);color:#fff;}
</style>
</head>

</div>

    case "v": return !!s.v;
    case "kaldi": return d.k;
    case "korea": return !!d.kr;
    case "fs": return d.fs==="O";
    case "sale": return d.sale && d.sale.indexOf("미보고")<0;
    case "p1": return d.p==="1";
    default: return d.sec===filter;
  }
}
function matchQuery(d){
  if(!query) return true;
  const hay=(d.n+" "+d.city+" "+d.fair+" "+d.a+" "+d.kra+" "+d.br+" "+d.kr+" "+d.ememo+" "+d.talk).toLowerCase();
  return hay.includes(query);
}

function prioRank(p){return p==="1"?0:p==="2"?1:p==="3"?2:3;}

function render(){
  buildChips();
  // counts
  let nv=0,nt=0,total=DATA.length;
  DATA.forEach(d=>{const s=st(d.id);if(s.v)nv++;if(s.t)nt++;});
  document.getElementById("counts").innerHTML=
    `<span>전체 ${total}</span><span class="cv">✓ 다녀옴 ${nv}</span>`+
    `<span class="ct">⭐ 타깃 ${nt}</span><span>🕒 남음 ${total-nv}</span>`;

  let list=DATA.filter(d=>matchFilter(d)&&matchQuery(d));
  const wrap=document.getElementById("wrap");
  wrap.innerHTML="";
  if(!list.length){wrap.innerHTML='<div class="empty">조건에 맞는 갤러리가 없어요</div>';return;}

  if(sortMode==="sec"){
    list.sort((a,b)=>SECORDER.indexOf(a.sec)-SECORDER.indexOf(b.sec)||prioRank(a.p)-prioRank(b.p)||a.n.localeCompare(b.n));
    let cur=null;
    list.forEach(d=>{
      if(d.sec!==cur){cur=d.sec;
        const cnt=list.filter(x=>x.sec===cur).length;
        const h=document.createElement("div");h.className="seclabel";
        h.innerHTML=`<span>${SECLABEL[cur]||cur}</span><small>${cnt}곳</small>`;
        wrap.appendChild(h);}
      wrap.appendChild(cardEl(d));
    });
  }else{
    if(sortMode==="prio") list.sort((a,b)=>prioRank(a.p)-prioRank(b.p)||SECORDER.indexOf(a.sec)-SECORDER.indexOf(b.sec)||a.n.localeCompare(b.n));
    else list.sort((a,b)=>a.n.localeCompare(b.n));
    list.forEach(d=>wrap.appendChild(cardEl(d)));
  }
}

function cardEl(d){
  const s=st(d.id);
  const card=document.createElement("div");
  card.className="card"+(s.t?" t":"")+(s.v?" v":"");
  // checks
  const ck=document.createElement("div");ck.className="ck";
  const vb=document.createElement("button");vb.className="b vb"+(s.v?" on":"");vb.textContent="✓";vb.title="다녀옴";
  const tb=document.createElement("button");tb.className="b tb"+(s.t?" on":"");tb.textContent="★";tb.title="타깃(가고싶음)";
  vb.onclick=()=>{const o=st(d.id);o.v=o.v?0:1;state[d.id]=o;save();render();};
  tb.onclick=()=>{const o=st(d.id);o.t=o.t?0:1;state[d.id]=o;save();render();};
  ck.appendChild(vb);ck.appendChild(tb);
  // body
  const body=document.createElement("div");body.className="body";
  let badges="";
  if(d.p==="1")badges+='<span class="badge bp1">P1</span>';
  else if(d.p==="2")badges+='<span class="badge bp2">P2</span>';
  else if(d.p==="3")badges+='<span class="badge bp3">P3</span>';
  if(d.k)badges+='<span class="badge bk">💎 KALDI</span>';
  if(d.fs==="O")badges+='<span class="badge bfs">Frieze서울\'26</span>';
  if(d.kr)badges+='<span class="badge bkr">🇰🇷</span>';
  if(d.debut)badges+='<span class="badge bdebut">첫참가</span>';
  if(d.ul)badges+='<span class="badge bul">Unlimited</span>';
  let meta=[]; if(d.b)meta.push('부스 <b>'+d.b+'</b>'); if(d.city)meta.push(d.city); if(d.f)meta.push(d.f);
  let html=`<div class="name">${esc(d.n)}${badges}</div>`;
  html+=`<div class="meta">${d.sec} · ${meta.join(" · ")||"부스 미정"}</div>`;
  const fa=(d.fair||d.a);
  if(fa){let a=fa.replace(/Unlimited:/g,"🎪 Unlimited:");html+=`<div class="art"><span class="lab">작가:</span> ${esc(a)}</div>`;}
  if(d.kra)html+=`<div class="art"><span class="lab">소속 한국작가:</span> ${esc(d.kra)}</div>`;
  if(d.kr)html+=`<div class="krline">🇰🇷 ${esc(d.kr)}</div>`;
  if(d.sale){ if(d.sale.indexOf("미보고")<0) html+=`<div class="sale">📈 ${esc(d.sale)}</div>`;
    else html+=`<div class="memo" style="color:#b0b4bd">📈 ${esc(d.sale)}</div>`; }
  if(d.ememo)html+=`<div class="memo">${esc(d.ememo)}</div>`;
  else if(d.memo)html+=`<div class="memo">${esc(d.memo)}</div>`;
  if(d.talk)html+=`<div class="talk"><b>💬</b> ${esc(d.talk)}</div>`;
  body.appendChild(wrapHtml(html));
  card.appendChild(ck);card.appendChild(body);
  return card;
}
function wrapHtml(h){const d=document.createElement("div");d.innerHTML=h;return d;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// copy output
function buildOutput(){
  const targets=DATA.filter(d=>st(d.id).t);
  const visited=DATA.filter(d=>st(d.id).v);
  const tline=d=>{
    let p=[]; if(d.b)p.push("부스 "+d.b); p.push(d.sec);
    let tags=[]; if(d.p==="1")tags.push("P1"); if(d.k)tags.push("KALDI"); if(d.fs==="O")tags.push("Frieze서울");
    let s=`▸ ${d.n} (${p.join(", ")})${tags.length?" ["+tags.join("/")+"]":""}`;
    if(d.fair)s+=`\n   작가: ${d.fair.replace(/Unlimited:/g,"Unlimited:")}`;
    if(d.sale&&d.sale.indexOf("미보고")<0)s+=`\n   판매: ${d.sale}`;
    if(d.talk)s+=`\n   💬 ${d.talk}`;
    return s;
  };
  const vline=d=>` - ${d.n}${d.b?" (부스 "+d.b+")":""}`;
  let out="=== Art Basel 2026 방문체크 · 2026-06-19 ===\n";
  out+=`다녀옴 ${visited.length} / 타깃 ${targets.length} / 전체 ${DATA.length}\n\n`;
  out+=`⭐ 가고싶은 곳 (네트워킹 타깃) — ${targets.length}곳:\n`;
  out+=targets.length?targets.map(tline).join("\n\n"):" (없음 — ⭐로 표시해 주세요)";
  out+=`\n\n✓ 이미 다녀온 곳 — ${visited.length}곳:\n`;
  out+=visited.length?visited.map(vline).join("\n"):" (없음)";
  out+="\n\n→ (선택) 위 ⭐ 타깃 중 더 깊게 파고싶은 갤러리 있으면 알려줘";
  return out;
}
document.getElementById("copyfab").onclick=()=>{
  document.getElementById("out").value=buildOutput();
  document.getElementById("modal").classList.add("on");
};
document.getElementById("doclose").onclick=()=>document.getElementById("modal").classList.remove("on");
document.getElementById("docopy").onclick=async()=>{
  const ta=document.getElementById("out");ta.select();
  try{await navigator.clipboard.writeText(ta.value);}catch(e){document.execCommand("copy");}
  const b=document.getElementById("docopy");b.textContent="✓ 복사됨!";setTimeout(()=>b.textContent="복사하기",1500);
};
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.querySelectorAll(".sortbtn").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".sortbtn").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");sortMode=b.dataset.sort;render();
});
render();

/* ===== NYC 갤러리 탭 ===== */
(function(){
  var NYKEY="ab2026_nyc_v1";
  var nyState=JSON.parse(localStorage.getItem(NYKEY)||"{}"); // {id:{c:1,n:1}}
  function nySave(){localStorage.setItem(NYKEY,JSON.stringify(nyState));}
  function nyGet(id){return nyState[id]||{};}
  function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function nyType(d){
    var city=(d.city||"").toLowerCase();
    if(city.indexOf("new york")>-1) return "hq";
    if(/new york|\bNY\b/i.test(d.br||"")) return "branch";
    return null;
  }
  var hq=[],br=[];
  DATA.forEach(function(d){var t=nyType(d); if(t==="hq")hq.push(d); else if(t==="branch")br.push(d);});
  var byName=function(a,b){return a.n.localeCompare(b.n);};
  hq.sort(byName); br.sort(byName);

  var view=document.getElementById("nycview"), countbar;

  function card(d,type){
    var g=nyGet(d.id);
    var el=document.createElement("div");
    el.className="nyc-card"+(g.n?" done":"");
    var founded=d.f?" · est."+esc(d.f):"";
    var brLine=d.br?'<div class="nyc-br">🌐 지사: '+esc(d.br)+'</div>':'';
    var talk=d.talk?'<div class="nyc-talk"><b>💬</b> '+esc(d.talk)+'</div>':'';
    el.innerHTML=
      '<div class="nyc-name">'+esc(d.n)+' <span class="nyc-tag '+(type==="hq"?"thq":"tbr")+'">'+(type==="hq"?"NY 본사":"NY 지사")+'</span></div>'+
      '<div class="nyc-sub">'+esc(d.sec||"")+founded+(d.city?" · "+esc(d.city):"")+'</div>'+
      brLine+talk+
      '<div class="nyc-chk">'+
        '<button class="nyc-b cardb'+(g.c?" on":"")+'" data-k="c">🪪 명함</button>'+
        '<button class="nyc-b visitb'+(g.n?" on":"")+'" data-k="n">📍 NY 방문</button>'+
      '</div>';
    el.querySelectorAll(".nyc-b").forEach(function(b){
      b.onclick=function(){
        var k=b.dataset.k,o=nyGet(d.id); o[k]=o[k]?0:1; nyState[d.id]=o; nySave();
        b.classList.toggle("on",!!o[k]);
        if(k==="n") el.classList.toggle("done",!!o.n);
        nyCounts();
      };
    });
    return el;
  }
  function section(title,arr,type){
    var h=document.createElement("div"); h.className="seclabel";
    h.innerHTML=title+' <small>'+arr.length+'곳</small>';
    view.appendChild(h);
    arr.forEach(function(d){view.appendChild(card(d,type));});
  }
  function nyCounts(){
    var cc=0,nn=0,total=hq.length+br.length;
    Object.keys(nyState).forEach(function(id){var o=nyState[id]; if(o&&o.c)cc++; if(o&&o.n)nn++;});
    countbar.innerHTML='<span>총 <b>'+total+'</b>곳</span><span class="cv">🪪 명함 '+cc+'</span><span class="ct">📍 방문 '+nn+'</span>';
  }
  (function build(){
    view.innerHTML="";
    var intro=document.createElement("div"); intro.className="nyc-intro";
    intro.innerHTML='<b>🗽 뉴욕에 본사·지사가 있는 AB2026 갤러리</b><br>바젤 부스에서 인사·명함 받고 → 11월 뉴욕에서 방문. <b>🪪</b>=명함 받음, <b>📍</b>=NY 방문 완료. <span class="nyc-mut">💬 스몰토크 멘트 포함 · 데이터는 메인 295곳에서 자동 추출</span>';
    view.appendChild(intro);
    countbar=document.createElement("div"); countbar.className="nyc-counts"; view.appendChild(countbar);
    section("🏛 뉴욕 본사 (HQ)",hq,"hq");
    section("🌐 뉴욕 지사 (Branch)",br,"branch");
    nyCounts();
  })();

  var tabMain=document.getElementById("tab-main"),tabNyc=document.getElementById("tab-nyc"),mainview=document.getElementById("mainview");
  var fab=(document.getElementById("copyfab")||{}).parentElement;
  function show(tab){
    var nyc=tab==="nyc";
    mainview.style.display=nyc?"none":"";
    view.style.display=nyc?"":"none";
    tabNyc.classList.toggle("on",nyc); tabMain.classList.toggle("on",!nyc);
    if(fab) fab.style.display=nyc?"none":"";
    window.scrollTo(0,0);
  }
  tabMain.onclick=function(){show("main");};
  tabNyc.onclick=function(){show("nyc");};
})();
</script>
